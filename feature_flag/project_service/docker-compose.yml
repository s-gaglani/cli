version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: project_service_db
    environment:
      POSTGRES_DB: project_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d project_service_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  project_service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: project_service_app
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8001"
    environment:
      DJANGO_SETTINGS_MODULE: project_service.settings.local
      SECRET_KEY: dev-secret-key-project-service-change-in-production
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      DB_NAME: project_service_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: "5432"
      CORS_ALLOW_ALL_ORIGINS: "True"
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
