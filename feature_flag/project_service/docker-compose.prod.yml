version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: project_service_db_prod
    environment:
      POSTGRES_DB: ${DB_NAME:-project_service_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-project_service_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  project_service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: project_service_app_prod
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn project_service.wsgi:application
             --bind 0.0.0.0:8001
             --workers 4
             --worker-class gthread
             --threads 2
             --timeout 120
             --keep-alive 5
             --access-logfile -
             --error-logfile -"
    environment:
      DJANGO_SETTINGS_MODULE: project_service.settings.production
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "False"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      DB_NAME: ${DB_NAME:-project_service_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
      CORS_ALLOW_ALL_ORIGINS: "False"
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  postgres_data_prod:
