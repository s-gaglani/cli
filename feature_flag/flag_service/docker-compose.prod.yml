version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-flag_service_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-flag_service_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn flag_service.wsgi:application
               --bind 0.0.0.0:8002
               --workers 4
               --worker-class sync
               --timeout 120
               --access-logfile -
               --error-logfile -
               --log-level info"
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: flag_service.settings.production
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
